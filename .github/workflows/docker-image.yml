name: build-and-push-image

# KC(카카오클라우드) PlayMCP는 컨테이너 이미지 배포 — 서버 재시작 시 레지스트리에서 :latest를 다시 당겨온다.
# 이 워크플로가 main 푸시마다 linux/amd64 이미지를 빌드해 ghcr.io에 :latest로 올린다(수동 docker build/push 불필요).
# 이미지에 API 키 없음(얇은 프록시 — 키는 Cloudflare 코어에만). GITHUB_TOKEN으로 ghcr 푸시(외부 시크릿 불필요).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository }} # = ghcr.io/bb4rjfl/weathersafetyos-mcp

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # ghcr 푸시 권한(자동 GITHUB_TOKEN에 부여)
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (linux/amd64 — KC는 arm64 반려)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          provenance: false # 단일 매니페스트(KC 이미지 pull 호환성)
          cache-from: type=gha
          cache-to: type=gha,mode=max
